<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-200 min-h-screen p-6">

  <!-- HEADER -->
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold text-gray-800">🚀 Task Manager</h1>
    <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-lg">
      Logout
    </button>
  </div>

  <!-- STATS -->
  <div class="grid grid-cols-4 gap-4 mb-6">
    <div class="bg-white p-4 rounded-xl shadow">
      <p>Total</p>
      <h2 id="total"></h2>
    </div>
    <div class="bg-red-100 p-4 rounded-xl shadow">
      <p>Todo</p>
      <h2 id="todo"></h2>
    </div>
    <div class="bg-yellow-100 p-4 rounded-xl shadow">
      <p>In Progress</p>
      <h2 id="progress"></h2>
    </div>
    <div class="bg-green-100 p-4 rounded-xl shadow">
      <p>Done</p>
      <h2 id="done"></h2>
    </div>
  </div>

  <!-- PROJECT SECTION -->
  <div class="bg-white p-4 rounded-xl shadow mb-6 flex gap-2">

    <input id="projectName" placeholder="New Project"
      class="border p-2 rounded w-40" />

    <button onclick="createProject()"
      class="bg-green-500 text-white px-4 py-2 rounded">
      Create
    </button>

    <select id="projectFilter"
      onchange="loadTasks()"
      class="border p-2 rounded w-40">
      <option value="">All</option>
    </select>

  </div>

  <!-- ADD TASK -->
  <div class="bg-white p-4 rounded-xl shadow mb-6 flex gap-2">

    <input id="title" placeholder="Task title"
      class="flex-1 border p-2 rounded" />

    <select id="project" class="border p-2 rounded w-40"></select>

    <select id="user" class="border p-2 rounded w-40"></select>

    <button onclick="addTask()"
      class="bg-blue-500 text-white px-4 py-2 rounded">
      Add
    </button>

  </div>

  <!-- KANBAN -->
  <div class="grid grid-cols-3 gap-6">

    <div class="bg-red-50 p-4 rounded-xl shadow">
      <h2 class="font-bold text-red-500">Todo</h2>
      <div id="todoCol"></div>
    </div>

    <div class="bg-yellow-50 p-4 rounded-xl shadow">
      <h2 class="font-bold text-yellow-500">In Progress</h2>
      <div id="progressCol"></div>
    </div>

    <div class="bg-green-50 p-4 rounded-xl shadow">
      <h2 class="font-bold text-green-500">Done</h2>
      <div id="doneCol"></div>
    </div>

  </div>

<script>


const token = localStorage.getItem("token");

if (!token) {
  alert("Login again");
  window.location.href = "login.html";
}

function logout() {
  localStorage.removeItem("token");
  window.location.href = "login.html";
}

// CREATE PROJECT
async function createProject() {
  if (!projectName.value.trim()) return alert("Enter project name");

  await fetch("/api/projects", {   // ✅ FIXED
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({ name: projectName.value })
  });

  projectName.value = "";
  loadMeta();
}

// LOAD META
async function loadMeta() {
  try {
    const projects = await fetch("/api/projects", {   // ✅ FIXED
      headers: { "Authorization": "Bearer " + token }
    }).then(r => r.json());

    const users = await fetch("/api/users", {   // ✅ FIXED
      headers: { "Authorization": "Bearer " + token }
    }).then(r => r.json());

    document.getElementById("project").innerHTML =
      projects.length
        ? projects.map(p => `<option value="${p._id}">${p.name}</option>`).join("")
        : `<option>No Projects</option>`;

    document.getElementById("user").innerHTML =
      users.length
        ? users.map(u => `<option value="${u._id}">${u.name}</option>`).join("")
        : `<option>No Users</option>`;

    document.getElementById("projectFilter").innerHTML =
      `<option value="">All</option>` +
      projects.map(p => `<option value="${p._id}">${p.name}</option>`).join("");

  } catch (err) {
    console.log("Meta error:", err);
  }
}

// LOAD TASKS
async function loadTasks() {
  try {
    const selectedProject = document.getElementById("projectFilter").value;

    let url = "/api/tasks";   // ✅ FIXED
    if (selectedProject) url += "?projectId=" + selectedProject;

    const res = await fetch(url, {
      headers: { "Authorization": "Bearer " + token }
    });

    const tasks = await res.json();

    let todo = 0, progress = 0, done = 0;

    todoCol.innerHTML = "";
    progressCol.innerHTML = "";
    doneCol.innerHTML = "";

    tasks.forEach(t => {
      const card = `
        <div class="bg-white p-3 rounded shadow mb-2">
          <h3>${t.title}</h3>
          <p>${t.projectId?.name || ""}</p>
          <p>${t.assignedTo?.name || ""}</p>

          <select onchange="updateStatus('${t._id}', this.value)">
            <option ${t.status=="todo"?"selected":""}>todo</option>
            <option ${t.status=="in-progress"?"selected":""}>in-progress</option>
            <option ${t.status=="done"?"selected":""}>done</option>
          </select>
        </div>
      `;

      if (t.status === "todo") {
        todo++;
        todoCol.innerHTML += card;
      } else if (t.status === "in-progress") {
        progress++;
        progressCol.innerHTML += card;
      } else {
        done++;
        doneCol.innerHTML += card;
      }
    });

    total.innerText = tasks.length;
    document.getElementById("todo").innerText = todo;
    document.getElementById("progress").innerText = progress;
    document.getElementById("done").innerText = done;

  } catch (err) {
    console.log("Task load error:", err);
  }
}

// ADD TASK
async function addTask() {
  if (!title.value.trim()) return alert("Enter task");

  if (!project.value) {
    alert("Create a project first");
    return;
  }

  try {
    const res = await fetch("/api/tasks", {   // ✅ FIXED
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({
        title: title.value,
        projectId: project.value,
        assignedTo: user.value
      })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data);
      return;
    }

    title.value = "";
    loadTasks();

  } catch (err) {
    console.log(err);
    alert("Error adding task");
  }
}

// UPDATE
async function updateStatus(id, status) {
  await fetch(`/api/tasks/${id}`, {   // ✅ FIXED
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({ status })
  });

  loadTasks();
}

// INIT
loadMeta();
loadTasks();

</script>

</body>
</html>
