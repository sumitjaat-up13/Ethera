<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-green-400 to-blue-500 flex items-center justify-center h-screen">

  <div class="bg-white p-8 rounded-2xl shadow-xl w-96">

    <h2 class="text-2xl font-bold text-center mb-6">Create Account</h2>

    <input id="name" placeholder="Name"
      class="w-full p-3 mb-3 border rounded-lg" />

    <input id="email" placeholder="Email"
      class="w-full p-3 mb-3 border rounded-lg" />

    <input id="password" type="password" placeholder="Password"
      class="w-full p-3 mb-4 border rounded-lg" />

    <button onclick="signup()"
      class="w-full bg-green-500 text-white py-3 rounded-lg hover:bg-green-600">
      Sign Up
    </button>

  </div>

<script>
async function signup() {
  await fetch("http://localhost:5000/api/auth/signup", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name: name.value,
      email: email.value,
      password: password.value,
      role: "member"
    })
  });

  alert("Signup successful");
  window.location.href = "login.html";
}
</script>

</body>
</html>
